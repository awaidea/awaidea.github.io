<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DiscussNow!</title>
    <style>
        /* 简单的样式设置，让图片展示更合适些 */
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <h1>欢迎来到留言板</h1>
    <div id="bing-image-container">
        <!-- 用于展示必应每日一图的容器 -->
    </div>
    <div id="giscus-container"></div>
    <script>
        // 使用JavaScript来获取并展示必应每日一图
        async function fetchBingImage() {
            try {
                const response = await fetch('https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1');
                const data = await response.json();
                const imageUrl = `https://www.bing.com${data.images[0].url}`;
                const imageContainer = document.getElementById('bing-image-container');
                const imgElement = document.createElement('img');
                imgElement.src = imageUrl;
                imageContainer.appendChild(imgElement);
            } catch (error) {
                console.error('获取必应每日一图出现错误：', error);
            }
        }

        fetchBingImage();
    </script>
    <script src="https://giscus.app/client.js"
            data-repo="awaidea/blog-1"
            data-repo-id="R_kgDONTjesg"
            data-category="Announcements"
            data-category-id="DIC_kwDONTjess4ClN4X"
            data-mapping="title"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="1"
            data-input-position="top"
            data-theme="cobalt"
            data-lang="zh-CN"
            data-loading="lazy"
            crossorigin="anonymous"
            async>
    </script>
</body>

</html>
