<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DiscussNow!</title>
    <style>
        /* 设置页面整体背景图片 */
        body {
            background-image: url('https://drive.almondcloud.cn/f/BXMocB/IMG_0692.JPG');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 简单的样式设置，让图片展示更合适些 */
        img {
            max-width: 100%;
            height: auto;
        }

        /* 新增的针对标题h1的样式规则 */
        h1 {
            text-align: center;
            font-family: "SimSun", sans-serif; /* 设置字体为宋体，若系统无宋体则使用备用字体sans-serif */
        }

        /* 屏幕适配相关样式，以下是一些示例，你可根据实际需求进一步调整 */
        /* 当屏幕宽度小于等于768px时（通常适配移动端等小屏幕设备） */
        @media (max-width: 768px) {
            h1 {
                font-size: 24px; /* 缩小标题字体大小 */
            }
            /* 可以根据实际情况调整背景图片等其他元素的样式，比如让背景图片只显示部分区域等 */
            body {
                background-size: contain;
            }
        }

        /* 当屏幕宽度大于768px且小于等于1024px时（比如一些平板设备） */
        @media (min-width: 769px) and (max-width: 1024px) {
            h1 {
                font-size: 30px;
            }
            /* 调整其他元素样式 */
            body {
                background-size: cover;
            }
        }

        /* 当屏幕宽度大于1024px（桌面端等大屏幕设备） */
        @media (min-width: 1025px) {
            h1 {
                font-size: 36px;
            }
            body {
                background-size: cover;
            }
        }

        /* 加载动画样式 */
       .loader {
            border: 16px solid #f3f3f3; /* 加载动画的浅色边框 */
            border-top: 16px solid #3498db; /* 加载动画的顶部深色边框，形成旋转效果 */
            border-radius: 50%;
            width: 120px;
            height: 120px;
            animation: spin 2s linear infinite; /* 应用名为spin的动画，2秒完成一次，线性，无限循环 */
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -60px;
            margin-left: -60px;
            z-index: 9999; /* 确保加载动画在其他元素之上显示 */
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg); /* 初始状态不旋转 */
            }

            100% {
                transform: rotate(360deg); /* 旋转360度，完成一圈旋转 */
            }
        }

        /* 初始隐藏页面内容，只显示加载动画 */
       .page-content {
            display: none;
        }
    </style>
</head>

<body>
    <div class="loader"></div> <!-- 加载动画元素 -->
    <div class="page-content"> <!-- 包裹页面实际内容的容器 -->
        <h1>欢迎来到留言板</h1>
        <div id="giscus-container"></div>
    </div>
    <script>
        window.onload = function () {
            // 页面加载完成后，隐藏加载动画，显示页面内容
            document.querySelector('.loader').style.display = 'none';
            document.querySelector('.page-content').style.display = 'block';
        };
    </script>
    <script src="https://giscus.app/client.js"
            data-repo="awaidea/blog-1"
            data-repo-id="R_kgDONTjesg"
            data-category="Announcements"
            data-category-id="DIC_kwDONTjess4ClN4X"
            data-mapping="title"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="1"
            data-input-position="top"
            data-theme="cobalt"
            data-lang="zh-CN"
            data-loading="lazy"
            crossorigin="anonymous"
            async>
    </script>
</body>

</html>
